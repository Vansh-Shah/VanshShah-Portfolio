<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0C"/>
      <stop offset="100%" style="stop-color:#111110"/>
    </linearGradient>
    <linearGradient id="accent-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0047FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#5B8EFF;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle accent glow top-left -->
  <ellipse cx="200" cy="180" rx="400" ry="300" fill="url(#accent-glow)"/>

  <!-- Top rule line -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#1E1E1C" stroke-width="1"/>

  <!-- Available badge -->
  <rect x="80" y="108" width="196" height="28" rx="14" fill="rgba(22,163,74,0.12)"/>
  <circle cx="101" cy="122" r="5" fill="#16A34A"/>
  <text x="116" y="127" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#16A34A" letter-spacing="0.05em">OPEN TO OPPORTUNITIES</text>

  <!-- Name -->
  <text x="80" y="240" font-family="system-ui, sans-serif" font-size="96" font-weight="800" fill="#F0F0EE" letter-spacing="-3px">Vansh</text>
  <text x="80" y="340" font-family="system-ui, sans-serif" font-size="96" font-weight="800" fill="#5B8EFF" letter-spacing="-3px">Shah</text>

  <!-- Divider -->
  <rect x="80" y="368" width="48" height="2" fill="#5B8EFF"/>

  <!-- Title -->
  <text x="80" y="415" font-family="system-ui, sans-serif" font-size="22" font-weight="400" fill="#999896">Assistant Technical Support Manager</text>
  <text x="80" y="445" font-family="system-ui, sans-serif" font-size="22" font-weight="400" fill="#999896">Ultradata Australia · Melbourne, VIC</text>

  <!-- Stats row -->
  <rect x="80" y="490" width="1040" height="1" fill="#1E1E1C"/>

  <text x="80"  y="525" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#F0F0EE">6+</text>
  <text x="80"  y="548" font-family="system-ui, sans-serif" font-size="12" fill="#999896">Years Experience</text>

  <text x="260" y="525" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#F0F0EE">2+</text>
  <text x="260" y="548" font-family="system-ui, sans-serif" font-size="12" fill="#999896">Years in FinTech</text>

  <text x="440" y="525" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#F0F0EE">80%</text>
  <text x="440" y="548" font-family="system-ui, sans-serif" font-size="12" fill="#999896">Masters Average</text>

  <text x="620" y="525" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#F0F0EE">3rd</text>
  <text x="620" y="548" font-family="system-ui, sans-serif" font-size="12" fill="#999896">RoboCup International</text>

  <!-- URL bottom right -->
  <text x="1120" y="548" font-family="system-ui, sans-serif" font-size="13" fill="#3A3A38" text-anchor="end">vansh-shah.github.io/VanshShah-Portfolio</text>

  <!-- Bottom rule -->
  <line x1="80" y1="570" x2="1120" y2="570" stroke="#1E1E1C" stroke-width="1"/>
</svg>
